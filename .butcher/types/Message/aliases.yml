answer:
  method: sendMessage
  code: &assert-chat |
    assert self.chat is not None, "This method can be used only if chat is present in the message."
  fill: &fill-answer
    chat_id: self.chat.id
    message_thread_id: self.message_thread_id if self.is_topic_message else None
    business_connection_id: self.business_connection_id

reply:
  method: sendMessage
  code: *assert-chat
  fill: &fill-reply
    <<: *fill-answer
    reply_parameters: self.as_reply_parameters()
    # A reply to an ephemeral message must itself be an ephemeral message.
    receiver_user_id: self.from_user.id if self.ephemeral_message_id and self.from_user else None
  ignore: &ignore-reply
    - reply_to_message_id

